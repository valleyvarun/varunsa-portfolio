<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <!-- Site Logo -->
        <a href="index.html" class="logo">
            <img src="images/logo psd.png" alt="VSA Logo">
        </a>
    </header>

    <!-- Main Content Area -->
    <main class="content-container">
        <!-- Main Grid -->
        <section class="main-grid">
            <!-- Grid Item 1 -->
            <div class="grid-item grid-item-1">
                <!-- Profile Image -->
                <img src="images/cv profile_psd.png" alt="Profile Picture" class="profile-image">
            </div>

            <!-- Grid Item 2 -->
            <div class="grid-item grid-item-2">
                <!-- PDF Viewer -->
                <iframe src="pdfs/project-covers.pdf" class="pdf-frame" title="Project Covers PDF Viewer"></iframe>
            </div>

            <!-- Grid Item 3 -->
            <div class="grid-item grid-item-3">
                <!-- Child Grid -->
                <div class="grid-child">
                    <!-- Child Grid Item 1 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>

                    <!-- Child Grid Item 2 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>

                    <!-- Child Grid Item 3 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>

                    <!-- Child Grid Item 4 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>
                </div>
            </div>

            <!-- Grid Item 4 -->
            <div class="grid-item grid-item-4">
                <!-- Profile Text -->
                <div id="profile-text"></div>
            </div>

            <!-- Grid Item 5 -->
            <div class="grid-item grid-item-5">Grid Item 5</div>

            <!-- Grid Item 6 -->
            <div class="grid-item grid-item-6">
                <!-- Child Grid -->
                <div class="grid-child">
                    <!-- Child Grid Item 1 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Image -->
                        <img src="images/portfolio-cover-page.png" alt="Portfolio Cover" class="grid-item-child-image">

                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">project name</div>
                    </div>

                    <!-- Child Grid Item 2 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Image -->
                        <img src="images/internship-cover.jpg" alt="Internship Cover" class="grid-item-child-image">

                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">project name</div>
                    </div>

                    <!-- Child Grid Item 3 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Image -->
                        <img src="images/research-cover.jpg" alt="Research Cover" class="grid-item-child-image">

                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">project name</div>
                    </div>

                    <!-- Child Grid Item 4 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">4</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script type="module" src="script.js"></script>
</body>
</html>
