<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <!-- Site Logo -->
        <a href="index.html" class="logo">
            <img src="images/logo psd.png" alt="VSA Logo">
        </a>
    </header>

    <!-- Main Content Area -->
    <main class="content-container">
        <!-- Main Grid -->
        <section class="main-grid">
            <!-- Grid Item 1 -->
            <div class="grid-item grid-item-1">
                <!-- Profile Image -->
                <img src="images/cv profile_psd.png" alt="Profile Picture" class="profile-image">
            </div>

            <!-- Grid Item 2 -->
            <div class="grid-item grid-item-2">
                <!-- PDF Viewer -->
                <div class="pdf-viewer">
                    <!-- PDF Viewer Header -->
                    <div class="pdf-viewer-header">
                        <!-- PDF Viewer Controls -->
                        <div class="pdf-viewer-controls">
                            <!-- Previous Page Button -->
                            <button type="button" id="pdf-prev" class="pdf-viewer-button" aria-label="Previous Page">&lt;</button>

                            <!-- Page Info -->
                            <div class="pdf-viewer-page-info"><span id="pdf-page-num">1</span> / <span id="pdf-page-count">0</span></div>

                            <!-- Next Page Button -->
                            <button type="button" id="pdf-next" class="pdf-viewer-button" aria-label="Next Page">&gt;</button>
                        </div>

                        <!-- Fullscreen Button -->
                        <button type="button" id="pdf-fullscreen" class="pdf-viewer-button" aria-label="Open Fullscreen">⛶</button>
                    </div>

                    <!-- PDF Viewer Body -->
                    <div class="pdf-viewer-body" id="pdf-viewer-body">
                        <!-- PDF Canvas -->
                        <canvas id="pdf-canvas" class="pdf-canvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- Grid Item 3 -->
            <div class="grid-item grid-item-3">
                <!-- Child Grid -->
                <div class="grid-child">
                    <!-- Child Grid Item 1 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>

                    <!-- Child Grid Item 2 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>

                    <!-- Child Grid Item 3 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>

                    <!-- Child Grid Item 4 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">coming soon</div>
                    </div>
                </div>
            </div>

            <!-- Grid Item 4 -->
            <div class="grid-item grid-item-4">
                <!-- Profile Text -->
                <div id="profile-text"></div>
            </div>

            <!-- Grid Item 5 -->
            <div class="grid-item grid-item-5">Grid Item 5</div>

            <!-- Grid Item 6 -->
            <div class="grid-item grid-item-6">
                <!-- Child Grid -->
                <div class="grid-child">
                    <!-- Child Grid Item 1 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Image -->
                        <img src="images/portfolio-cover-page.png" alt="Portfolio Cover" class="grid-item-child-image">

                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">project name</div>
                    </div>

                    <!-- Child Grid Item 2 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Image -->
                        <img src="images/internship-cover.jpg" alt="Internship Cover" class="grid-item-child-image">

                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">project name</div>
                    </div>

                    <!-- Child Grid Item 3 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Image -->
                        <img src="images/research-cover.jpg" alt="Research Cover" class="grid-item-child-image">

                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">project name</div>
                    </div>

                    <!-- Child Grid Item 4 -->
                    <div class="grid-item-child">
                        <!-- Child Grid Text -->
                        <div class="grid-item-child-text">4</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- PDF Popup -->
    <div class="pdf-popup" id="pdf-popup" aria-hidden="true">
        <!-- PDF Popup Panel -->
        <div class="pdf-popup-panel">
            <!-- PDF Popup Header -->
            <div class="pdf-viewer-header">
                <!-- PDF Popup Controls -->
                <div class="pdf-viewer-controls">
                    <!-- Previous Page Button -->
                    <button type="button" id="pdf-popup-prev" class="pdf-viewer-button" aria-label="Previous Page">&lt;</button>

                    <!-- Page Info -->
                    <div class="pdf-viewer-page-info"><span id="pdf-popup-page-num">1</span> / <span id="pdf-popup-page-count">0</span></div>

                    <!-- Next Page Button -->
                    <button type="button" id="pdf-popup-next" class="pdf-viewer-button" aria-label="Next Page">&gt;</button>
                </div>

                <!-- Close Button -->
                <button type="button" id="pdf-popup-close" class="pdf-viewer-button" aria-label="Close Fullscreen">×</button>
            </div>

            <!-- PDF Popup Body -->
            <div class="pdf-viewer-body" id="pdf-popup-body">
                <!-- PDF Popup Canvas -->
                <canvas id="pdf-popup-canvas" class="pdf-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="pdf-viewer.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
